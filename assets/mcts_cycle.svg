<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc">
  <title id="title">One AlphaGo Monte Carlo tree search simulation</title>
  <desc id="desc">A simulation selects prior-guided actions, expands one leaf, evaluates it with a value network and fast rollout, then backs both results up with alternating player perspectives.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity=".15"/></filter><style>.card{rx:18;stroke-width:2;filter:url(#s)}.h{font:700 21px system-ui,sans-serif;fill:#0f172a;text-anchor:middle}.p{font:14px system-ui,sans-serif;fill:#334155;text-anchor:middle}.m{font:italic 17px Georgia,serif;fill:#312e81;text-anchor:middle}.e{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#a)}</style></defs>
  <rect width="1100" height="360" rx="24" fill="#f8fafc"/>
  <rect class="card" x="35" y="85" width="220" height="155" fill="#dbeafe" stroke="#3b82f6"/><text x="145" y="125" class="h">1 · Select</text><text x="145" y="158" class="m">argmaxₐ Q(s,a)+u(s,a)</text><text x="145" y="188" class="p">prior-guided confidence</text><text x="145" y="211" class="p">descends the current tree</text>
  <rect class="card" x="305" y="85" width="220" height="155" fill="#ede9fe" stroke="#8b5cf6"/><text x="415" y="125" class="h">2 · Expand</text><text x="415" y="158" class="m">P(s,a)=pσ(a|s)</text><text x="415" y="188" class="p">add legal child edges</text><text x="415" y="211" class="p">at the reached leaf</text>
  <rect class="card" x="575" y="65" width="245" height="195" fill="#dcfce7" stroke="#22c55e"/><text x="697" y="107" class="h">3 · Evaluate</text><text x="697" y="141" class="m">vθ(sL)</text><text x="697" y="168" class="p">learned position value</text><text x="697" y="201" class="m">zL ∼ pπ</text><text x="697" y="228" class="p">fast rollout to game end</text>
  <rect class="card" x="870" y="85" width="195" height="155" fill="#ffe4e6" stroke="#f43f5e"/><text x="967" y="125" class="h">4 · Back up</text><text x="967" y="158" class="m">Nv,Wv,Nr,Wr</text><text x="967" y="188" class="p">flip perspective</text><text x="967" y="211" class="p">at every ply</text>
  <path class="e" d="M255 162 H295"/><path class="e" d="M525 162 H565"/><path class="e" d="M820 162 H860"/><path class="e" d="M967 250 C960 325 145 325 145 250"/>
  <text x="545" y="337" class="p">Repeat simulations; choose the root action with the largest visit count.</text>
</svg>

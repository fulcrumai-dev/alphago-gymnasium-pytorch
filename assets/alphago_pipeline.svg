<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">AlphaGo 2016 training and search pipeline</title>
  <desc id="desc">Expert positions train supervised and rollout policies. The supervised policy initializes a reinforcement learning policy. Its self-play games train a value network. Supervised policy priors, value estimates, and fast rollouts meet in Monte Carlo tree search.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity=".13"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker>
    <style>
      .box{stroke-width:2;rx:16;filter:url(#shadow)} .label{font:600 20px system-ui,sans-serif;fill:#0f172a;text-anchor:middle}.sub{font:14px system-ui,sans-serif;fill:#334155;text-anchor:middle}.edge{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.stage{font:700 13px system-ui,sans-serif;letter-spacing:1px;fill:#64748b}.math{font:italic 17px Georgia,serif;fill:#312e81;text-anchor:middle}
    </style>
  </defs>
  <rect width="1200" height="420" rx="24" fill="url(#bg)"/>
  <text x="44" y="40" class="stage">TRAINING</text>
  <rect class="box" x="40" y="70" width="190" height="105" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="135" y="110" class="label">Expert positions</text><text x="135" y="138" class="sub">human KGS games in paper</text>
  <rect class="box" x="300" y="55" width="220" height="105" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="410" y="94" class="label">SL policy</text><text x="410" y="121" class="math">pσ(a | s)</text><text x="410" y="143" class="sub">expert move prediction</text>
  <rect class="box" x="300" y="215" width="220" height="105" fill="#cffafe" stroke="#06b6d4"/>
  <text x="410" y="254" class="label">Fast rollout</text><text x="410" y="281" class="math">pπ(a | s)</text><text x="410" y="303" class="sub">cheap local policy</text>
  <rect class="box" x="590" y="55" width="220" height="105" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="700" y="94" class="label">RL policy</text><text x="700" y="121" class="math">pρ(a | s)</text><text x="700" y="143" class="sub">opponent-pool self-play</text>
  <rect class="box" x="590" y="215" width="220" height="105" fill="#dcfce7" stroke="#22c55e"/>
  <text x="700" y="254" class="label">Value network</text><text x="700" y="281" class="math">vθ(s)</text><text x="700" y="303" class="sub">self-play outcome regression</text>
  <rect class="box" x="920" y="112" width="235" height="150" fill="#ffe4e6" stroke="#f43f5e"/>
  <text x="1037" y="156" class="label">APV-MCTS</text><text x="1037" y="185" class="sub">SL priors + value + rollout</text><text x="1037" y="214" class="math">Q = (1−λ)Qv + λQr</text><text x="1037" y="239" class="sub">search selects the move</text>
  <path class="edge" d="M230 105 H290"/><path class="edge" d="M230 138 C260 170 260 245 290 265"/>
  <path class="edge" d="M520 107 H580"/><text x="550" y="93" class="sub">initialize</text>
  <path class="edge" d="M700 160 V205"/><text x="774" y="190" class="sub">distinct self-play states</text>
  <path class="edge" d="M520 95 C700 0 875 55 920 140"/><path class="edge" d="M520 267 C700 390 875 300 920 236"/><path class="edge" d="M810 267 C860 267 875 230 910 215"/>
  <text x="42" y="382" class="sub" style="text-anchor:start">The 2016 search intentionally uses the supervised policy for broad tree priors; the RL policy supplies the value network's self-play distribution.</text>
</svg>

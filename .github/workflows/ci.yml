name: test-and-notebook

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install locked environment
        run: uv sync --frozen --extra dev
      - name: Unit and integration tests
        run: uv run pytest --cov --cov-branch --cov-report=term-missing --cov-fail-under=80
      - name: Execute CPU notebook smoke profile
        run: uv run python scripts/validate_notebook.py --profile smoke --device cpu --timeout 900
      - name: Upload executed notebook
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebook-cpu
          path: artifacts/notebooks/*.ipynb
          if-no-files-found: warn

